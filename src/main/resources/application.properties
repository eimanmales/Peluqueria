spring.application.name=Peluqueria

# ============================================================
#  BASE DE DATOS - MySQL
#  Cambia el usuario y contrase\u00c3\u00b1a seg\u00c3\u00ban tu entorno local
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/peluqueria_db?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
#  JPA / HIBERNATE
#  validate = Hibernate verifica el esquema pero NO lo modifica
#  (Flyway es quien crea y versiona las tablas)
# ============================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================================
#  FLYWAY - Migraciones de base de datos
# ============================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ============================================================
#  THYMELEAF
# ============================================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ============================================================
#  SERVIDOR
# ============================================================
server.port=8080