<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="'Factura ' + ${pago.numeroFactura}">Factura</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body{background:#f0f2f5;}
        @media print {
            .no-print { display: none !important; }
            body { background: white; }
            .card { box-shadow: none !important; }
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}" class="no-print"></div>
<div class="container py-4" style="max-width:600px">

    <!-- Botones de acción -->
    <div class="d-flex gap-2 mb-3 no-print">
        <button onclick="window.print()" class="btn btn-dark">
            <i class="bi bi-printer me-1"></i>Imprimir
        </button>
        <a th:href="@{/pagos}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>Volver
        </a>
    </div>

    <!-- Factura -->
    <div class="card shadow-sm">
        <div class="card-body p-4">

            <!-- Encabezado -->
            <div class="text-center mb-4">
                <h4 class="fw-bold mb-0">✂️ Peluquería</h4>
                <small class="text-muted">Sistema de Gestión</small>
                <hr/>
                <h5 class="text-uppercase fw-bold">Factura de Pago</h5>
                <code class="fs-5" th:text="${pago.numeroFactura}"></code>
            </div>

            <!-- Datos del pago -->
            <table class="table table-borderless">
                <tr>
                    <td class="text-muted">Fecha:</td>
                    <td class="fw-semibold"
                        th:text="${#temporals.format(pago.fecha,'dd/MM/yyyy HH:mm')}"></td>
                </tr>
                <tr th:if="${pago.cita != null}">
                    <td class="text-muted">Cliente:</td>
                    <td class="fw-semibold"
                        th:text="${pago.cita.cliente.getNombreCompleto()}"></td>
                </tr>
                <tr th:if="${pago.cita != null}">
                    <td class="text-muted">Servicio:</td>
                    <td th:text="${pago.cita.servicio.nombre}"></td>
                </tr>
                <tr th:if="${pago.cita != null}">
                    <td class="text-muted">Peluquero:</td>
                    <td th:text="${pago.cita.peluquero.getNombreCompleto()}"></td>
                </tr>
                <tr>
                    <td class="text-muted">Método:</td>
                    <td>
                        <span class="badge bg-dark" th:text="${pago.metodoPago}"></span>
                    </td>
                </tr>
            </table>

            <hr/>

            <!-- Total -->
            <div class="d-flex justify-content-between align-items-center">
                <span class="fs-5 text-muted">TOTAL:</span>
                <span class="fs-3 fw-bold text-dark">
                    $<span th:text="${#numbers.formatDecimal(pago.monto,1,'POINT',0,'COMMA')}"></span>
                </span>
            </div>

            <hr/>
            <p class="text-center text-muted small mb-0">¡Gracias por su preferencia!</p>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
