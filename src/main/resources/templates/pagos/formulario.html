<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Registrar Pago</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body{background:#f0f2f5;}
        .form-check-input {
            width: 18px;
            height: 18px;
            border: 2px solid #000 !important;
            background-color: #fff;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <!-- Alerta de descuento disponible -->
            <div th:if="${descuentoDisponible}" class="alert alert-success mb-3">
                <i class="bi bi-tag-fill me-1"></i>
                <strong>¡Descuento disponible!</strong>
                <span th:text="${descuentoDisponible.descripcion}"></span>
                — <strong th:text="${descuentoDisponible.porcentaje}"></strong>% de descuento.<br/>
                Monto con descuento:
                <strong>$<span th:text="${#numbers.formatDecimal(montoConDescuento,1,'POINT',0,'COMMA')}"></span></strong>
            </div>

            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white">
                    <h5 class="mb-0"><i class="bi bi-cash-stack me-2"></i>Registrar Pago</h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/pagos/registrar}" th:object="${pago}" method="post">
                        <input type="hidden" th:field="*{id}"/>

                        <!-- Cita -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Cita *</label>
                            <select th:field="*{cita.id}" class="form-select" required>
                                <option value="">— Selecciona la cita a cobrar —</option>
                                <option th:each="c : ${citas}"
                                        th:value="${c.id}"
                                        th:text="${c.cliente.getNombreCompleto()} + ' — ' + ${c.servicio.nombre} + ' ($' + ${c.servicio.precio} + ')'">
                                </option>
                            </select>
                        </div>

                        <!-- Monto -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Monto a cobrar (COP) *</label>
                            <div class="input-group">
                                <span class="input-group-text">$</span>
                                <input type="number" th:field="*{monto}" class="form-control"
                                       step="100" min="0" required/>
                            </div>
                            <div class="form-text" th:if="${descuentoDisponible}">
                                <i class="bi bi-info-circle me-1 text-success"></i>
                                Ajusta el monto si aplicas el descuento del
                                <span th:text="${descuentoDisponible.porcentaje}"></span>%.
                            </div>
                        </div>

                        <!-- Método de pago -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Método de pago *</label>
                            <div class="d-flex gap-3">
                                <div th:each="m : ${metodos}" class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio"
                                           th:field="*{metodoPago}" th:value="${m}" required/>
                                    <label class="form-check-label" th:for="${'metodo_' + m}" th:text="${m}"></label>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-dark flex-fill">
                                <i class="bi bi-receipt me-1"></i>Registrar y Generar Factura
                            </button>
                            <a th:href="@{/pagos}" class="btn btn-outline-secondary flex-fill">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
