<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Pagos — Peluquería</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>body{background:#f0f2f5;}</style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <h4 class="fw-bold mb-0"><i class="bi bi-cash-stack me-2"></i>Pagos</h4>
        <a th:href="@{/pagos/nuevo}" class="btn btn-dark">
            <i class="bi bi-plus-lg me-1"></i>Registrar Pago
        </a>
    </div>

    <!-- Total del día -->
    <div class="card border-0 bg-dark text-white mb-4 shadow-sm">
        <div class="card-body d-flex justify-content-between align-items-center">
            <div>
                <div class="small opacity-75">Total recaudado hoy</div>
                <div class="fs-3 fw-bold">
                    $<span th:text="${#numbers.formatDecimal(totalHoy, 1, 'POINT', 0, 'COMMA')}"></span>
                </div>
            </div>
            <i class="bi bi-cash-coin fs-1 opacity-25"></i>
        </div>
    </div>

    <div th:if="${exito}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle me-1"></i><span th:text="${exito}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Factura</th><th>Cliente</th><th>Servicio</th>
                        <th>Método</th><th>Fecha</th>
                        <th class="text-end">Monto</th><th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${pagos}">
                        <td><code th:text="${p.numeroFactura}"></code></td>
                        <td th:text="${p.cita != null ? p.cita.cliente.getNombreCompleto() : '—'}"></td>
                        <td th:text="${p.cita != null ? p.cita.servicio.nombre : '—'}"></td>
                        <td>
                            <span class="badge"
                                  th:text="${p.metodoPago}"
                                  th:classappend="${p.metodoPago.name() == 'EFECTIVO'} ? 'bg-success' :
                                                   (${p.metodoPago.name() == 'TARJETA'} ? 'bg-primary' : 'bg-info text-dark')">
                            </span>
                        </td>
                        <td th:text="${#temporals.format(p.fecha, 'dd/MM/yyyy HH:mm')}"></td>
                        <td class="text-end fw-semibold">
                            $<span th:text="${#numbers.formatDecimal(p.monto,1,'POINT',0,'COMMA')}"></span>
                        </td>
                        <td class="text-center">
                            <a th:href="@{/pagos/factura/{id}(id=${p.id})}"
                               class="btn btn-sm btn-outline-secondary" title="Ver factura">
                                <i class="bi bi-receipt"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(pagos)}">
                        <td colspan="7" class="text-center text-muted py-4">No hay pagos registrados.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
