<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${titulo}">Cita</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>body{background:#f0f2f5;}</style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white">
                    <h5 class="mb-0"><i class="bi bi-calendar-plus me-2"></i><span th:text="${titulo}"></span></h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/citas/guardar}" th:object="${cita}" method="post">
                        <input type="hidden" th:field="*{id}"/>
                        <input type="hidden" th:field="*{tiempoEsperaMin}"/>
                        <input type="hidden" th:field="*{fechaCreacion}"/>

                        <!-- Cliente -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Cliente *</label>
                            <select th:field="*{cliente.id}" class="form-select" required>
                                <option value="">— Selecciona un cliente —</option>
                                <option th:each="c : ${clientes}"
                                        th:value="${c.id}"
                                        th:text="${c.getNombreCompleto()}"></option>
                            </select>
                        </div>

                        <!-- Servicio -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Servicio *</label>
                            <select th:field="*{servicio.id}" class="form-select" required>
                                <option value="">— Selecciona un servicio —</option>
                                <option th:each="s : ${servicios}"
                                        th:value="${s.id}"
                                        th:text="${s.nombre} + ' — $' + ${s.precio} + ' (' + ${s.duracionMinutos} + ' min)'"></option>
                            </select>
                        </div>

                        <!-- Peluquero -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Peluquero *</label>
                            <select th:field="*{peluquero.id}" class="form-select" required>
                                <option value="">— Selecciona un peluquero —</option>
                                <option th:each="p : ${peluqueros}"
                                        th:value="${p.id}"
                                        th:text="${p.getNombreCompleto()}"></option>
                            </select>
                        </div>

                        <!-- Fecha y hora -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Fecha y hora *</label>
                            <input type="datetime-local" th:field="*{fechaHora}"
                                   class="form-control" required/>
                            <div class="form-text">
                                <i class="bi bi-info-circle me-1"></i>
                                El tiempo de espera se calcula automáticamente al guardar.
                            </div>
                        </div>

                        <!-- Notas -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Notas</label>
                            <textarea th:field="*{notas}" class="form-control" rows="2"
                                      placeholder="Preferencias del cliente, observaciones..."></textarea>
                        </div>

                        <div class="d-flex gap-2 mt-2">
                            <button type="submit" class="btn btn-dark flex-fill">
                                <i class="bi bi-save me-1"></i>Guardar Cita
                            </button>
                            <a th:href="@{/citas}" class="btn btn-outline-secondary flex-fill">
                                Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
