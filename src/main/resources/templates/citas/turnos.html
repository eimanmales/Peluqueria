<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Turnos en Curso — Peluquería</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body { background: #f0f2f5; }
        .turno-en-curso  { border-left: 5px solid #0d6efd; }
        .turno-pendiente { border-left: 5px solid #ffc107; }
        .reloj { font-size: 1.5rem; font-weight: bold; color: #1a1a2e; }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container py-4">

    <!-- Encabezado con reloj en tiempo real -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0"><i class="bi bi-display me-2"></i>Turnos en Tiempo Real</h4>
        <div class="text-end">
            <div class="reloj" id="reloj">--:--:--</div>
            <small class="text-muted">Actualiza cada 30 seg.</small>
        </div>
    </div>

    <!-- Sin citas activas -->
    <div th:if="${#lists.isEmpty(citasActivas)}"
         class="alert alert-info text-center py-5">
        <i class="bi bi-calendar-x fs-1 d-block mb-2"></i>
        <strong>No hay turnos activos en este momento.</strong>
        <div class="mt-2">
            <a th:href="@{/citas/nueva}" class="btn btn-dark btn-sm">
                <i class="bi bi-plus-lg me-1"></i>Agendar Cita
            </a>
        </div>
    </div>

    <!-- Tarjetas de turnos -->
    <div class="row g-3">
        <div class="col-md-6 col-lg-4" th:each="c, iter : ${citasActivas}">
            <div class="card shadow-sm h-100"
                 th:classappend="${c.estado.name() == 'EN_CURSO'} ? 'turno-en-curso' : 'turno-pendiente'">
                <div class="card-header d-flex justify-content-between align-items-center"
                     th:classappend="${c.estado.name() == 'EN_CURSO'} ? 'bg-primary text-white' : 'bg-warning text-dark'">
                    <span>
                        <i class="bi bi-person-fill me-1"></i>
                        <strong th:text="${c.cliente.getNombreCompleto()}"></strong>
                    </span>
                    <span class="badge bg-light text-dark"
                          th:text="${c.estado.name() == 'EN_CURSO'} ? 'EN CURSO' : 'Turno #' + ${iter.count}"></span>
                </div>
                <div class="card-body">
                    <p class="mb-1">
                        <i class="bi bi-scissors me-1 text-muted"></i>
                        <span th:text="${c.servicio.nombre}"></span>
                    </p>
                    <p class="mb-1">
                        <i class="bi bi-person-badge me-1 text-muted"></i>
                        <span th:text="${c.peluquero.getNombreCompleto()}"></span>
                    </p>
                    <p class="mb-1">
                        <i class="bi bi-clock me-1 text-muted"></i>
                        <span th:text="${#temporals.format(c.fechaHora, 'HH:mm')}"></span>
                        <small class="text-muted ms-1">
                            (<span th:text="${c.servicio.duracionMinutos}"></span> min)
                        </small>
                    </p>
                    <!-- Tiempo de espera estimado -->
                    <div class="mt-2 p-2 rounded"
                         th:classappend="${c.estado.name() == 'EN_CURSO'} ? 'bg-primary bg-opacity-10' : 'bg-warning bg-opacity-10'">
                        <small class="text-muted">Tiempo de espera:</small>
                        <div class="fw-bold">
                            <span th:text="${c.tiempoEsperaMin == 0} ? 'Inmediato' : ${c.tiempoEsperaMin} + ' minutos'"></span>
                        </div>
                    </div>
                </div>
                <!-- Botones de acción -->
                <div class="card-footer bg-transparent d-flex gap-2">
                    <a th:if="${c.estado.name() == 'PENDIENTE'}"
                       th:href="@{/citas/estado/{id}/EN_CURSO(id=${c.id})}"
                       class="btn btn-primary btn-sm flex-fill">
                        <i class="bi bi-play-fill me-1"></i>Iniciar
                    </a>
                    <a th:if="${c.estado.name() == 'EN_CURSO'}"
                       th:href="@{/citas/estado/{id}/COMPLETADA(id=${c.id})}"
                       class="btn btn-success btn-sm flex-fill">
                        <i class="bi bi-check-lg me-1"></i>Completar
                    </a>
                    <a th:href="@{/citas/cancelar/{id}(id=${c.id})}"
                       class="btn btn-outline-danger btn-sm"
                       onclick="return confirm('¿Cancelar este turno?')">
                        <i class="bi bi-x-lg"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="text-center mt-4">
        <a th:href="@{/citas}" class="btn btn-outline-dark btn-sm">
            <i class="bi bi-list me-1"></i>Ver todas las citas
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Reloj en tiempo real
    function actualizarReloj() {
        const ahora = new Date();
        document.getElementById('reloj').textContent =
            ahora.toLocaleTimeString('es-CO');
    }
    actualizarReloj();
    setInterval(actualizarReloj, 1000);

    // Recarga la página cada 30 segundos para actualizar turnos
    setTimeout(() => location.reload(), 30000);
</script>
</body></html>
