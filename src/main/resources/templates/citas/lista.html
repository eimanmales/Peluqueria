<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Citas — Peluquería</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>body{background:#f0f2f5;}</style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <h4 class="fw-bold mb-0"><i class="bi bi-calendar-check me-2"></i>Citas</h4>
        <div class="d-flex gap-2">
            <a th:href="@{/citas/turnos}" class="btn btn-outline-dark">
                <i class="bi bi-display me-1"></i>Ver Turnos
            </a>
            <a th:href="@{/citas/nueva}" class="btn btn-dark">
                <i class="bi bi-plus-lg me-1"></i>Nueva Cita
            </a>
        </div>
    </div>

    <!-- Mensajes -->
    <div th:if="${exito}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle me-1"></i><span th:text="${exito}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <i class="bi bi-exclamation-triangle me-1"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Tabla de citas -->
    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Cliente</th>
                        <th>Servicio</th>
                        <th>Peluquero</th>
                        <th>Fecha y Hora</th>
                        <th class="text-center">Espera</th>
                        <th class="text-center">Estado</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="c : ${citas}">
                        <td th:text="${c.id}"></td>
                        <td th:text="${c.cliente.getNombreCompleto()}"></td>
                        <td th:text="${c.servicio.nombre}"></td>
                        <td th:text="${c.peluquero.getNombreCompleto()}"></td>
                        <td th:text="${#temporals.format(c.fechaHora, 'dd/MM/yyyy HH:mm')}"></td>
                        <td class="text-center">
                            <small class="text-muted">
                                <i class="bi bi-clock me-1"></i>
                                <span th:text="${c.tiempoEsperaMin} + ' min'"></span>
                            </small>
                        </td>
                        <td class="text-center">
                            <span class="badge"
                                  th:classappend="${c.estado.name() == 'PENDIENTE'} ? 'bg-warning text-dark' :
                                                  (${c.estado.name() == 'EN_CURSO'} ? 'bg-primary' :
                                                  (${c.estado.name() == 'COMPLETADA'} ? 'bg-success' : 'bg-secondary'))"
                                  th:text="${c.estado}"></span>
                        </td>
                        <td class="text-center">
                            <div class="btn-group btn-group-sm">
                                <!-- Marcar EN_CURSO -->
                                <a th:if="${c.estado.name() == 'PENDIENTE'}"
                                   th:href="@{/citas/estado/{id}/EN_CURSO(id=${c.id})}"
                                   class="btn btn-outline-primary" title="Iniciar">
                                    <i class="bi bi-play-fill"></i>
                                </a>
                                <!-- Marcar COMPLETADA -->
                                <a th:if="${c.estado.name() == 'EN_CURSO'}"
                                   th:href="@{/citas/estado/{id}/COMPLETADA(id=${c.id})}"
                                   class="btn btn-outline-success" title="Completar">
                                    <i class="bi bi-check-lg"></i>
                                </a>
                                <!-- Editar -->
                                <a th:if="${c.estado.name() == 'PENDIENTE'}"
                                   th:href="@{/citas/editar/{id}(id=${c.id})}"
                                   class="btn btn-outline-secondary" title="Editar">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <!-- Cancelar -->
                                <a th:if="${c.estado.name() != 'COMPLETADA' and c.estado.name() != 'CANCELADA'}"
                                   th:href="@{/citas/cancelar/{id}(id=${c.id})}"
                                   class="btn btn-outline-danger" title="Cancelar"
                                   onclick="return confirm('¿Cancelar esta cita?')">
                                    <i class="bi bi-x-lg"></i>
                                </a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(citas)}">
                        <td colspan="8" class="text-center text-muted py-4">
                            No hay citas registradas.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
