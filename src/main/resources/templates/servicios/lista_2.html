<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Servicios — Peluquería</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>body{background:#f0f2f5;}</style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container py-4">

    <!-- Encabezado -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0"><i class="bi bi-scissors me-2"></i>Catálogo de Servicios</h4>
        <a th:href="@{/servicios/nuevo}" class="btn btn-dark"
           sec:authorize="hasAnyRole('ADMIN','RECEPCIONISTA')">
            <i class="bi bi-plus-lg me-1"></i> Nuevo Servicio
        </a>
    </div>

    <!-- Mensajes -->
    <div th:if="${exito}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle me-1"></i><span th:text="${exito}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <i class="bi bi-exclamation-triangle me-1"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Tarjetas de servicios -->
    <div class="row g-3">
        <div class="col-md-4" th:each="s : ${servicios}">
            <div class="card h-100 shadow-sm" th:classappend="${!s.activo} ? 'opacity-50' : ''">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start">
                        <h5 class="card-title fw-semibold" th:text="${s.nombre}"></h5>
                        <span class="badge" th:classappend="${s.activo} ? 'bg-success' : 'bg-secondary'"
                              th:text="${s.activo} ? 'Activo' : 'Inactivo'"></span>
                    </div>
                    <p class="card-text text-muted small" th:text="${s.descripcion}"></p>
                    <div class="d-flex justify-content-between mt-3">
                        <span class="fs-5 fw-bold text-dark">
                            $<span th:text="${#numbers.formatDecimal(s.precio, 1, 'POINT', 0, 'COMMA')}"></span>
                        </span>
                        <span class="text-muted small align-self-center">
                            <i class="bi bi-clock me-1"></i><span th:text="${s.duracionMinutos}"></span> min
                        </span>
                    </div>
                </div>
                <div class="card-footer bg-transparent d-flex gap-2"
                     sec:authorize="hasAnyRole('ADMIN','RECEPCIONISTA')">
                    <a th:href="@{/servicios/editar/{id}(id=${s.id})}"
                       class="btn btn-sm btn-outline-secondary flex-fill">
                        <i class="bi bi-pencil me-1"></i>Editar
                    </a>
                    <a th:href="@{/servicios/desactivar/{id}(id=${s.id})}"
                       class="btn btn-sm btn-outline-danger flex-fill"
                       sec:authorize="hasRole('ADMIN')"
                       th:if="${s.activo}"
                       onclick="return confirm('¿Desactivar este servicio?')">
                        <i class="bi bi-x-circle me-1"></i>Desactivar
                    </a>
                </div>
            </div>
        </div>
        <!-- Si no hay servicios -->
        <div class="col-12" th:if="${#lists.isEmpty(servicios)}">
            <div class="alert alert-info text-center">
                <i class="bi bi-info-circle me-1"></i>No hay servicios registrados aún.
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
