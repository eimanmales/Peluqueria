<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${titulo}">Servicio</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>body{background:#f0f2f5;}</style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white">
                    <h5 class="mb-0"><i class="bi bi-scissors me-2"></i><span th:text="${titulo}"></span></h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/servicios/guardar}" th:object="${servicio}" method="post">
                        <input type="hidden" th:field="*{id}"/>
                        <input type="hidden" th:field="*{activo}"/>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Nombre del servicio *</label>
                            <input type="text" th:field="*{nombre}" class="form-control"
                                   placeholder="Ej: Corte clásico" required/>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Descripción</label>
                            <textarea th:field="*{descripcion}" class="form-control" rows="3"
                                      placeholder="Describe el servicio..."></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Precio (COP) *</label>
                                <input type="number" th:field="*{precio}" class="form-control"
                                       step="500" min="0" placeholder="25000" required/>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">Duración (minutos) *</label>
                                <input type="number" th:field="*{duracionMinutos}" class="form-control"
                                       min="5" max="240" placeholder="30" required/>
                            </div>
                        </div>

                        <div class="d-flex gap-2 mt-2">
                            <button type="submit" class="btn btn-dark flex-fill">
                                <i class="bi bi-save me-1"></i>Guardar
                            </button>
                            <a th:href="@{/servicios}" class="btn btn-outline-secondary flex-fill">
                                Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
