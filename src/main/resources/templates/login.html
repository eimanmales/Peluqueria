<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Iniciar Sesión — Peluquería</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-card {
            border: none;
            border-radius: 1rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .login-header {
            background: linear-gradient(135deg, #e63946, #c1121f);
            border-radius: 1rem 1rem 0 0;
            padding: 2rem;
            text-align: center;
        }
        .login-icon {
            font-size: 3rem;
            color: white;
        }
        .btn-login {
            background: linear-gradient(135deg, #e63946, #c1121f);
            border: none;
            border-radius: 0.5rem;
            color: white;
            font-weight: 600;
            transition: opacity .2s;
        }
        .btn-login:hover { opacity: .85; color: white; }
        .input-group-text { background: #f8f9fa; border-right: none; }
        .form-control { border-left: none; }
        .form-control:focus { box-shadow: none; border-color: #ced4da; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-9 col-md-6 col-lg-4">

            <div class="card login-card">
                <!-- Cabecera -->
                <div class="login-header">
                    <div class="login-icon"><i class="bi bi-scissors"></i></div>
                    <h4 class="text-white mt-2 mb-0 fw-bold">Peluquería</h4>
                    <small class="text-white-50">Sistema de Gestión</small>
                </div>

                <!-- Formulario -->
                <div class="card-body p-4">
                    <h5 class="card-title text-center mb-4 text-secondary">Iniciar Sesión</h5>

                    <!-- Mensajes de error / éxito -->
                    <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show py-2" role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-1"></i>
                        <span th:text="${errorMsg}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                    <div th:if="${logoutMsg}" class="alert alert-success alert-dismissible fade show py-2" role="alert">
                        <i class="bi bi-check-circle-fill me-1"></i>
                        <span th:text="${logoutMsg}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <!-- th:action apunta al loginProcessingUrl definido en SecurityConfig -->
                    <form th:action="@{/login}" method="post">

                        <div class="mb-3">
                            <label for="username" class="form-label fw-semibold">Usuario</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-person text-secondary"></i>
                                </span>
                                <input type="text" id="username" name="username"
                                       class="form-control" placeholder="Ingresa tu usuario"
                                       autofocus required/>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label fw-semibold">Contraseña</label>
                            <div class="input-group">
                                <span class="input-group-text">
                                    <i class="bi bi-lock text-secondary"></i>
                                </span>
                                <input type="password" id="password" name="password"
                                       class="form-control" placeholder="Ingresa tu contraseña"
                                       required/>
                            </div>
                        </div>

                        <!-- Token CSRF generado automáticamente por Thymeleaf + Spring Security -->
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <button type="submit" class="btn btn-login w-100 py-2">
                            <i class="bi bi-box-arrow-in-right me-1"></i> Ingresar
                        </button>
                    </form>
                </div>

                <div class="card-footer text-center text-muted py-2">
                    <small>Institución Universitaria Antonio José Camacho</small>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
