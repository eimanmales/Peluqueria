<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<!-- Navbar reutilizable: th:replace="fragments/navbar :: navbar" -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark"
     style="background: linear-gradient(135deg, #1a1a2e, #0f3460);">
    <div class="container-fluid">

        <a class="navbar-brand fw-bold" th:href="@{/home}">
            <i class="bi bi-scissors me-1"></i> Peluquería
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">

                <!-- Citas (admin + recepcionista) -->
                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','RECEPCIONISTA')">
                    <a class="nav-link" th:href="@{/citas}">
                        <i class="bi bi-calendar-check me-1"></i> Citas
                    </a>
                </li>

                <!-- Clientes (admin + recepcionista) -->
                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','RECEPCIONISTA')">
                    <a class="nav-link" th:href="@{/clientes}">
                        <i class="bi bi-people me-1"></i> Clientes
                    </a>
                </li>

                <!-- Servicios (todos) -->
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/servicios}">
                        <i class="bi bi-scissors me-1"></i> Servicios
                    </a>
                </li>

                <!-- Máquinas (admin + peluquero) -->
                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','PELUQUERO')">
                    <a class="nav-link" th:href="@{/maquinas}">
                        <i class="bi bi-tools me-1"></i> Equipos
                    </a>
                </li>

                <!-- Admin: usuarios y bitácora -->
                <li class="nav-item dropdown" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link dropdown-toggle" href="#" role="button"
                       data-bs-toggle="dropdown">
                        <i class="bi bi-shield-lock me-1"></i> Admin
                    </a>
                    <ul class="dropdown-menu dropdown-menu-dark">
                        <li>
                            <a class="dropdown-item" th:href="@{/admin/usuarios}">
                                <i class="bi bi-person-gear me-1"></i> Usuarios
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item" th:href="@{/admin/bitacora}">
                                <i class="bi bi-journal-text me-1"></i> Bitácora
                            </a>
                        </li>
                    </ul>
                </li>
            </ul>

            <!-- Menú del usuario actual -->
            <ul class="navbar-nav ms-auto">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button"
                       data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle me-1"></i>
                        <sec:authentication property="name"/>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark">
                        <li>
                            <form th:action="@{/logout}" method="post" class="d-inline">
                                <input type="hidden" th:name="${_csrf.parameterName}"
                                       th:value="${_csrf.token}"/>
                                <button type="submit" class="dropdown-item">
                                    <i class="bi bi-box-arrow-right me-1"></i> Cerrar Sesión
                                </button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

</body>
</html>
