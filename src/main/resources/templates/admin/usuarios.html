<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Usuarios — Peluquería</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>body{background:#f0f2f5;}</style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0"><i class="bi bi-person-gear me-2"></i>Gestión de Usuarios</h4>
        <a th:href="@{/admin/usuarios/nuevo}" class="btn btn-dark">
            <i class="bi bi-plus-lg me-1"></i>Nuevo Usuario
        </a>
    </div>

    <div th:if="${exito}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle me-1"></i><span th:text="${exito}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
        <i class="bi bi-exclamation-triangle me-1"></i><span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>#</th><th>Usuario</th><th>Nombre completo</th>
                        <th>Email</th><th class="text-center">Rol</th>
                        <th class="text-center">Estado</th><th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u : ${usuarios}">
                        <td th:text="${u.id}"></td>
                        <td class="fw-semibold"><i class="bi bi-person me-1 text-muted"></i>
                            <span th:text="${u.username}"></span>
                        </td>
                        <td th:text="${u.getNombreCompleto()}"></td>
                        <td th:text="${u.email != null ? u.email : '—'}"></td>
                        <td class="text-center">
                            <span class="badge"
                                  th:text="${u.rol}"
                                  th:classappend="${u.rol.name() == 'ADMIN'} ? 'bg-danger' :
                                                   (${u.rol.name() == 'PELUQUERO'} ? 'bg-primary' : 'bg-secondary')">
                            </span>
                        </td>
                        <td class="text-center">
                            <span class="badge" th:text="${u.activo ? 'Activo' : 'Inactivo'}"
                                  th:classappend="${u.activo} ? 'bg-success' : 'bg-secondary'"></span>
                        </td>
                        <td class="text-center">
                            <div class="btn-group btn-group-sm">
                                <a th:href="@{/admin/usuarios/editar/{id}(id=${u.id})}"
                                   class="btn btn-outline-primary" title="Editar">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:if="${u.activo}"
                                   th:href="@{/admin/usuarios/desactivar/{id}(id=${u.id})}"
                                   class="btn btn-outline-danger" title="Desactivar"
                                   onclick="return confirm('¿Desactivar este usuario?')">
                                    <i class="bi bi-person-x"></i>
                                </a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(usuarios)}">
                        <td colspan="7" class="text-center text-muted py-4">No hay usuarios registrados.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
