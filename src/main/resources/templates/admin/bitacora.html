<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Bitácora — Peluquería</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body{background:#f0f2f5;}
        .badge-accion { font-size: 0.75rem; font-weight: 500; }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0"><i class="bi bi-journal-text me-2"></i>Bitácora del Sistema</h4>
        <small class="text-muted">Últimos 50 registros</small>
    </div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover table-sm mb-0 align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Fecha y Hora</th>
                        <th>Usuario</th>
                        <th>Acción</th>
                        <th>Detalle</th>
                        <th>IP</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="r : ${registros}">
                        <td class="text-nowrap">
                            <small th:text="${#temporals.format(r.fechaHora, 'dd/MM/yyyy HH:mm:ss')}"></small>
                        </td>
                        <td>
                            <span th:if="${r.usuario != null}"
                                  th:text="${r.usuario.username}"
                                  class="fw-semibold"></span>
                            <span th:unless="${r.usuario != null}"
                                  class="text-muted fst-italic">eliminado</span>
                        </td>
                        <td>
                            <span class="badge bg-dark badge-accion" th:text="${r.accion}"></span>
                        </td>
                        <td><small th:text="${r.detalle}"></small></td>
                        <td><small class="text-muted" th:text="${r.ipAddress ?: '—'}"></small></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(registros)}">
                        <td colspan="5" class="text-center text-muted py-4">
                            <i class="bi bi-journal-x me-1"></i>No hay registros en la bitácora.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="text-center mt-3">
        <a th:href="@{/home}" class="btn btn-outline-dark btn-sm">
            <i class="bi bi-house me-1"></i>Volver al inicio
        </a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
