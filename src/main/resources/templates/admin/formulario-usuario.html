<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${titulo}">Usuario</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>body{background:#f0f2f5;}</style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white">
                    <h5 class="mb-0"><i class="bi bi-person-gear me-2"></i><span th:text="${titulo}"></span></h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/admin/usuarios/guardar}" th:object="${usuario}" method="post">
                        <input type="hidden" th:field="*{id}"/>
                        <input type="hidden" th:field="*{activo}"/>
                        <input type="hidden" th:field="*{fechaRegistro}"/>

                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label fw-semibold">Nombre *</label>
                                <input type="text" th:field="*{nombre}" class="form-control" required/>
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label fw-semibold">Apellido *</label>
                                <input type="text" th:field="*{apellido}" class="form-control" required/>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Nombre de usuario *</label>
                            <input type="text" th:field="*{username}" class="form-control"
                                   placeholder="Ej: peluquero2" required/>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Contraseña *</label>
                            <input type="password" th:field="*{password}" class="form-control"
                                   placeholder="Contraseña de acceso" required/>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email</label>
                            <input type="email" th:field="*{email}" class="form-control"
                                   placeholder="correo@ejemplo.com"/>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Teléfono</label>
                            <input type="text" th:field="*{telefono}" class="form-control"
                                   placeholder="3001234567"/>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Rol *</label>
                            <select th:field="*{rol}" class="form-select" required>
                                <option value="">— Selecciona un rol —</option>
                                <option th:each="r : ${roles}" th:value="${r}" th:text="${r}"></option>
                            </select>
                        </div>

                        <div class="d-flex gap-2 mt-2">
                            <button type="submit" class="btn btn-dark flex-fill">
                                <i class="bi bi-save me-1"></i>Guardar
                            </button>
                            <a th:href="@{/admin/usuarios}" class="btn btn-outline-secondary flex-fill">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
