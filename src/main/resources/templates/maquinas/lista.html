<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Equipos — Peluquería</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>body{background:#f0f2f5;}</style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="fw-bold mb-0"><i class="bi bi-tools me-2"></i>Equipos y Herramientas</h4>
        <a th:href="@{/maquinas/nueva}" class="btn btn-dark" sec:authorize="hasRole('ADMIN')">
            <i class="bi bi-plus-lg me-1"></i>Nuevo Equipo
        </a>
    </div>

    <!-- Alerta de mantenimiento pendiente -->
    <div th:if="${!#lists.isEmpty(alertas)}" class="alert alert-warning mb-3">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <strong><span th:text="${#lists.size(alertas)}"></span> equipo(s) necesitan mantenimiento:</strong>
        <span th:each="a, i : ${alertas}">
            <span th:text="${a.nombre}"></span><span th:if="${!i.last}">, </span>
        </span>
    </div>

    <div th:if="${exito}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle me-1"></i><span th:text="${exito}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>#</th><th>Nombre</th><th>Tipo</th>
                        <th class="text-center">Usos</th>
                        <th>Último Mantenimiento</th>
                        <th class="text-center">Estado</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="m : ${maquinas}"
                        th:classappend="${m.necesitaMantenimiento()} ? 'table-warning' : ''">
                        <td th:text="${m.id}"></td>
                        <td class="fw-semibold">
                            <span th:text="${m.nombre}"></span>
                            <span th:if="${m.necesitaMantenimiento()}"
                                  class="badge bg-warning text-dark ms-1">
                                <i class="bi bi-wrench"></i> Mantenimiento
                            </span>
                        </td>
                        <td th:text="${m.tipo != null ? m.tipo : '—'}"></td>
                        <td class="text-center">
                            <span class="badge bg-secondary" th:text="${m.usosTotales}"></span>
                        </td>
                        <td th:text="${m.fechaUltimoMantenimiento != null ?
                                       #temporals.format(m.fechaUltimoMantenimiento,'dd/MM/yyyy') : 'Nunca'}">
                        </td>
                        <td class="text-center">
                            <span class="badge"
                                  th:text="${m.estado}"
                                  th:classappend="${m.estado.name() == 'OPERATIVA'} ? 'bg-success' :
                                                   (${m.estado.name() == 'EN_MANTENIMIENTO'} ? 'bg-warning text-dark' : 'bg-danger')">
                            </span>
                        </td>
                        <td class="text-center">
                            <div class="btn-group btn-group-sm">
                                <a th:href="@{/maquinas/uso/{id}(id=${m.id})}"
                                   class="btn btn-outline-secondary" title="Registrar uso">
                                    <i class="bi bi-plus"></i>
                                </a>
                                <a th:href="@{/maquinas/mantenimiento/{id}(id=${m.id})}"
                                   class="btn btn-outline-warning" title="Registrar mantenimiento">
                                    <i class="bi bi-wrench"></i>
                                </a>
                                <a th:href="@{/maquinas/editar/{id}(id=${m.id})}"
                                   class="btn btn-outline-primary" sec:authorize="hasRole('ADMIN')">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <a th:href="@{/maquinas/eliminar/{id}(id=${m.id})}"
                                   class="btn btn-outline-danger" sec:authorize="hasRole('ADMIN')"
                                   onclick="return confirm('¿Eliminar este equipo?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(maquinas)}">
                        <td colspan="7" class="text-center text-muted py-4">No hay equipos registrados.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
