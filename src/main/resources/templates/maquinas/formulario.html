<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${titulo}">Máquina</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>body{background:#f0f2f5;}</style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white">
                    <h5 class="mb-0"><i class="bi bi-tools me-2"></i><span th:text="${titulo}"></span></h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/maquinas/guardar}" th:object="${maquina}" method="post">
                        <input type="hidden" th:field="*{id}"/>
                        <input type="hidden" th:field="*{usosTotales}"/>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Nombre *</label>
                            <input type="text" th:field="*{nombre}" class="form-control"
                                   placeholder="Ej: Máquina Wahl 1" required/>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Tipo</label>
                            <input type="text" th:field="*{tipo}" class="form-control"
                                   placeholder="Máquina de corte, Secador, Navaja..."/>
                        </div>

                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label fw-semibold">Fecha de compra</label>
                                <input type="date" th:field="*{fechaCompra}" class="form-control"/>
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label fw-semibold">Último mantenimiento</label>
                                <input type="date" th:field="*{fechaUltimoMantenimiento}" class="form-control"/>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Frecuencia de mantenimiento (días) *</label>
                            <input type="number" th:field="*{frecuenciaMantenimientoDias}"
                                   class="form-control" min="1" required/>
                            <div class="form-text">Cada cuántos días se debe hacer mantenimiento.</div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Estado *</label>
                            <select th:field="*{estado}" class="form-select" required>
                                <option th:each="e : ${estados}" th:value="${e}" th:text="${e}"></option>
                            </select>
                        </div>

                        <div class="d-flex gap-2 mt-2">
                            <button type="submit" class="btn btn-dark flex-fill">
                                <i class="bi bi-save me-1"></i>Guardar
                            </button>
                            <a th:href="@{/maquinas}" class="btn btn-outline-secondary flex-fill">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
