<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Inicio — Peluquería</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>
        body { background: #f0f2f5; }
        .topbar { background: linear-gradient(135deg, #1a1a2e, #0f3460); }
        .stat-card {
            border: none;
            border-radius: .75rem;
            transition: transform .15s;
            cursor: default;
        }
        .stat-card:hover { transform: translateY(-3px); }
        .icon-wrap {
            width: 52px; height: 52px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-4">

    <!-- Saludo -->
    <div class="mb-4">
        <h4 class="fw-bold mb-0">
            Bienvenido,
            <span th:text="${usuarioActual != null ? usuarioActual.nombreCompleto : 'Usuario'}"></span>
            👋
        </h4>
        <small class="text-muted">
            Rol:
            <span class="badge bg-secondary"
                  th:text="${usuarioActual != null ? usuarioActual.rol : ''}"></span>
        </small>
    </div>

    <!-- Tarjetas de acceso rápido según rol -->
    <div class="row g-3">

        <!-- Citas -->
        <div class="col-sm-6 col-lg-3"
             sec:authorize="hasAnyRole('ADMIN','RECEPCIONISTA')">
            <a th:href="@{/citas}" class="text-decoration-none">
                <div class="card stat-card shadow-sm h-100">
                    <div class="card-body d-flex align-items-center gap-3">
                        <div class="icon-wrap bg-primary bg-opacity-10 text-primary">
                            <i class="bi bi-calendar-check"></i>
                        </div>
                        <div>
                            <div class="fw-semibold">Citas</div>
                            <small class="text-muted">Gestionar turnos</small>
                        </div>
                    </div>
                </div>
            </a>
        </div>

        <!-- Clientes -->
        <div class="col-sm-6 col-lg-3"
             sec:authorize="hasAnyRole('ADMIN','RECEPCIONISTA')">
            <a th:href="@{/clientes}" class="text-decoration-none">
                <div class="card stat-card shadow-sm h-100">
                    <div class="card-body d-flex align-items-center gap-3">
                        <div class="icon-wrap bg-success bg-opacity-10 text-success">
                            <i class="bi bi-people"></i>
                        </div>
                        <div>
                            <div class="fw-semibold">Clientes</div>
                            <small class="text-muted">Directorio</small>
                        </div>
                    </div>
                </div>
            </a>
        </div>

        <!-- Catálogo de servicios -->
        <div class="col-sm-6 col-lg-3">
            <a th:href="@{/servicios}" class="text-decoration-none">
                <div class="card stat-card shadow-sm h-100">
                    <div class="card-body d-flex align-items-center gap-3">
                        <div class="icon-wrap bg-warning bg-opacity-10 text-warning">
                            <i class="bi bi-scissors"></i>
                        </div>
                        <div>
                            <div class="fw-semibold">Servicios</div>
                            <small class="text-muted">Catálogo digital</small>
                        </div>
                    </div>
                </div>
            </a>
        </div>

        <!-- Equipos -->
        <div class="col-sm-6 col-lg-3"
             sec:authorize="hasAnyRole('ADMIN','PELUQUERO')">
            <a th:href="@{/maquinas}" class="text-decoration-none">
                <div class="card stat-card shadow-sm h-100">
                    <div class="card-body d-flex align-items-center gap-3">
                        <div class="icon-wrap bg-danger bg-opacity-10 text-danger">
                            <i class="bi bi-tools"></i>
                        </div>
                        <div>
                            <div class="fw-semibold">Equipos</div>
                            <small class="text-muted">Mantenimiento</small>
                        </div>
                    </div>
                </div>
            </a>
        </div>

        <!-- Usuarios (solo admin) -->
        <div class="col-sm-6 col-lg-3" sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/admin/usuarios}" class="text-decoration-none">
                <div class="card stat-card shadow-sm h-100">
                    <div class="card-body d-flex align-items-center gap-3">
                        <div class="icon-wrap bg-info bg-opacity-10 text-info">
                            <i class="bi bi-person-gear"></i>
                        </div>
                        <div>
                            <div class="fw-semibold">Usuarios</div>
                            <small class="text-muted">Gestión de accesos</small>
                        </div>
                    </div>
                </div>
            </a>
        </div>

        <!-- Bitácora (solo admin) -->
        <div class="col-sm-6 col-lg-3" sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/admin/bitacora}" class="text-decoration-none">
                <div class="card stat-card shadow-sm h-100">
                    <div class="card-body d-flex align-items-center gap-3">
                        <div class="icon-wrap bg-secondary bg-opacity-10 text-secondary">
                            <i class="bi bi-journal-text"></i>
                        </div>
                        <div>
                            <div class="fw-semibold">Bitácora</div>
                            <small class="text-muted">Auditoría del sistema</small>
                        </div>
                    </div>
                </div>
            </a>
        </div>

    </div><!-- /row -->
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
