<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Descuentos — Peluquería</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <style>body{background:#f0f2f5;}</style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold mb-0"><i class="bi bi-tag me-2"></i>Descuentos y Fidelización</h4>
        <a th:href="@{/descuentos/nuevo}" class="btn btn-dark">
            <i class="bi bi-plus-lg me-1"></i>Nuevo Descuento
        </a>
    </div>

    <div th:if="${exito}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle me-1"></i><span th:text="${exito}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Cliente</th><th>Descripción</th>
                        <th class="text-center">Descuento</th>
                        <th class="text-center">Cortes req.</th>
                        <th>Cortes acum.</th>
                        <th>Vigencia</th>
                        <th class="text-center">Estado</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="d : ${descuentos}">
                        <td class="fw-semibold" th:text="${d.cliente.getNombreCompleto()}"></td>
                        <td th:text="${d.descripcion ?: '—'}"></td>
                        <td class="text-center">
                            <span class="badge bg-success fs-6">
                                <span th:text="${d.porcentaje}"></span>%
                            </span>
                        </td>
                        <td class="text-center" th:text="${d.cortesRequeridos}"></td>
                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <div class="progress flex-fill" style="height:8px">
                                    <div class="progress-bar bg-success"
                                         th:style="'width:' + ${T(java.lang.Math).min(100, d.cliente.cortesAcumulados * 100 / d.cortesRequeridos)} + '%'">
                                    </div>
                                </div>
                                <small th:text="${d.cliente.cortesAcumulados} + '/' + ${d.cortesRequeridos}"></small>
                            </div>
                        </td>
                        <td>
                            <small th:if="${d.fechaInicio != null}"
                                   th:text="${#temporals.format(d.fechaInicio,'dd/MM/yy')} + ' — ' + ${d.fechaFin != null ? #temporals.format(d.fechaFin,'dd/MM/yy') : 'indefinido'}">
                            </small>
                            <span th:unless="${d.fechaInicio != null}" class="text-muted">Sin límite</span>
                        </td>
                        <td class="text-center">
                            <span class="badge"
                                  th:text="${d.esVigente()} ? 'Vigente' : (d.activo ? 'Activo' : 'Inactivo')"
                                  th:classappend="${d.esVigente()} ? 'bg-success' : (${d.activo} ? 'bg-warning text-dark' : 'bg-secondary')">
                            </span>
                        </td>
                        <td class="text-center">
                            <div class="btn-group btn-group-sm">
                                <a th:href="@{/descuentos/editar/{id}(id=${d.id})}"
                                   class="btn btn-outline-primary"><i class="bi bi-pencil"></i></a>
                                <a th:href="@{/descuentos/toggle/{id}(id=${d.id})}"
                                   class="btn btn-outline-warning"
                                   th:title="${d.activo ? 'Desactivar' : 'Activar'}">
                                    <i th:classappend="${d.activo} ? 'bi bi-pause-fill' : 'bi bi-play-fill'" class="bi"></i>
                                </a>
                                <a th:href="@{/descuentos/eliminar/{id}(id=${d.id})}"
                                   class="btn btn-outline-danger" sec:authorize="hasRole('ADMIN')"
                                   onclick="return confirm('¿Eliminar este descuento?')">
                                    <i class="bi bi-trash"></i>
                                </a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(descuentos)}">
                        <td colspan="8" class="text-center text-muted py-4">
                            No hay descuentos registrados.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
